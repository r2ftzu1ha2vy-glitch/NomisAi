<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NomisAi</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F0D060;
    --gold-dim: #8B7322;
    --gold-glow: rgba(212,175,55,0.18);
    --bg: #181818;
    --bg2: #222222;
    --bg3: #2a2a2a;
    --sidebar: #141414;
    --text: #F0E8D0;
    --text2: #A09070;
    --border: rgba(212,175,55,0.18);
    --radius: 12px;
    --shadow: 0 4px 32px rgba(0,0,0,0.5);
    --nomis-bubble: #1e1c15;
    --user-bubble: #2a2310;
    --input-bg: #1e1e1e;
    --scrollbar: #333;
  }
  body.light {
    --bg: #f7f3ea;
    --bg2: #ede8da;
    --bg3: #e5dfc8;
    --sidebar: #f0ead6;
    --text: #1a1200;
    --text2: #6b5a20;
    --border: rgba(180,140,20,0.25);
    --nomis-bubble: #fdf6e0;
    --user-bubble: #fff9e6;
    --input-bg: #fdfaf0;
    --scrollbar: #ccc;
  }
  body.super-dark {
    --bg: #000000;
    --bg2: #0a0a0a;
    --bg3: #0f0f0f;
    --sidebar: #000000;
    --text: #F0E8D0;
    --text2: #806040;
    --border: rgba(212,175,55,0.12);
    --nomis-bubble: #0a0900;
    --user-bubble: #100d00;
    --input-bg: #080808;
    --scrollbar: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ---- AUTH SCREEN ---- */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  #auth-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .auth-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 420px;
    max-width: 95vw;
    box-shadow: 0 8px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.08);
    position: relative;
    z-index: 1;
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-logo img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    box-shadow: 0 0 24px rgba(212,175,55,0.3);
    margin-bottom: 12px;
    object-fit: cover;
  }
  .auth-logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: 4px;
  }
  .auth-logo p {
    color: var(--text2);
    font-size: 0.9rem;
    margin-top: 4px;
  }
  .auth-tabs {
    display: flex;
    background: var(--bg3);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    color: var(--text2);
    transition: all 0.2s;
    border: none;
    background: transparent;
  }
  .auth-tab.active {
    background: var(--gold);
    color: #000;
  }
  .auth-form { display: none; flex-direction: column; gap: 16px; }
  .auth-form.active { display: flex; }
  .auth-form input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .auth-form input:focus { border-color: var(--gold); }
  .auth-form input::placeholder { color: var(--text2); }
  .auth-btn {
    background: linear-gradient(135deg, var(--gold) 0%, #b8960c 100%);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,175,55,0.4); }
  .auth-error { color: #e55; font-size: 0.85rem; text-align: center; display: none; }

  /* ---- MAIN APP ---- */
  #app {
    display: none;
    height: 100vh;
    flex-direction: row;
  }
  #app.visible { display: flex; }

  /* ---- SIDEBAR ---- */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    transition: background 0.3s;
  }
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sidebar-brand img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    object-fit: cover;
  }
  .sidebar-brand span {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: 3px;
  }
  .tab-switcher {
    display: flex;
    background: var(--bg3);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .tab-btn {
    flex: 1;
    padding: 7px 4px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .tab-btn.active {
    background: var(--gold);
    color: #000;
  }
  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--gold-glow);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 14px;
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
    width: 100%;
    letter-spacing: 1px;
  }
  .new-chat-btn:hover { background: rgba(212,175,55,0.14); }
  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .chat-list::-webkit-scrollbar { width: 4px; }
  .chat-list::-webkit-scrollbar-track { background: transparent; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
  .chat-item {
    padding: 10px 12px;
    border-radius: 9px;
    cursor: pointer;
    color: var(--text2);
    font-size: 0.88rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .chat-item:hover { background: var(--bg3); color: var(--text); }
  .chat-item.active { background: var(--gold-glow); color: var(--gold); border-color: var(--border); }
  .chat-item-del {
    margin-left: auto;
    opacity: 0;
    color: var(--text2);
    font-size: 0.8rem;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .chat-item:hover .chat-item-del { opacity: 1; }
  .chat-item-del:hover { color: #e55; background: rgba(255,50,50,0.1); }
  .sidebar-footer {
    padding: 14px 12px;
    border-top: 1px solid var(--border);
  }
  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 8px;
  }
  .user-info:hover { background: var(--bg3); }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: #000;
    font-weight: 700;
    flex-shrink: 0;
  }
  .user-name { font-size: 0.9rem; font-weight: 600; }
  .sidebar-actions { display: flex; gap: 6px; }
  .sidebar-action-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .sidebar-action-btn:hover { color: var(--gold); border-color: var(--gold); }

  /* ---- MAIN AREA ---- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    transition: background 0.3s;
  }
  .topbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .ai-badge {
    display: flex; align-items: center; gap: 8px;
  }
  .ai-badge img {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--gold);
    object-fit: cover;
  }
  .ai-badge-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .ai-badge-sub { font-size: 0.75rem; color: var(--text2); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .mode-btn {
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .mode-btn:hover, .mode-btn.active { color: var(--gold); border-color: var(--gold); }
  .noteshelf-link {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 13px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
    border: 1px solid var(--border);
    color: var(--gold);
    text-decoration: none;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .noteshelf-link:hover { background: rgba(212,175,55,0.2); box-shadow: 0 0 12px rgba(212,175,55,0.2); }

  /* ---- CHAT AREA ---- */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

  .welcome-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 40px 20px;
    text-align: center;
  }
  .welcome-screen img {
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 2.5px solid var(--gold);
    box-shadow: 0 0 40px rgba(212,175,55,0.25);
    margin-bottom: 20px;
    object-fit: cover;
  }
  .welcome-screen h2 {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .welcome-screen p { color: var(--text2); font-size: 1rem; max-width: 400px; }
  .welcome-chips {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center;
    margin-top: 28px;
    max-width: 560px;
  }
  .chip {
    padding: 10px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Rajdhani', sans-serif;
  }
  .chip:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }

  .message-row {
    display: flex;
    padding: 12px 24px;
    gap: 14px;
    animation: msgIn 0.25s ease;
  }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .message-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 700;
    margin-top: 2px;
  }
  .msg-avatar.nomis {
    border: 1.5px solid var(--gold);
    overflow: hidden;
  }
  .msg-avatar.nomis img { width: 100%; height: 100%; object-fit: cover; }
  .msg-avatar.user-av {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: #000;
  }
  .msg-content { max-width: 70%; display: flex; flex-direction: column; gap: 4px; }
  .msg-bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 0.97rem;
    line-height: 1.65;
    position: relative;
  }
  .message-row.nomis-row .msg-bubble {
    background: var(--nomis-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .message-row.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(212,175,55,0.2);
    border-top-right-radius: 4px;
    color: var(--text);
  }
  .msg-time { font-size: 0.72rem; color: var(--text2); padding: 0 4px; }
  .message-row.user .msg-time { text-align: right; }

  /* Code blocks */
  .code-block {
    background: #0d0d0d;
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 10px;
    margin: 10px 0;
    overflow: hidden;
    font-family: 'Fira Code', monospace;
  }
  body.light .code-block { background: #1a1a1a; }
  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: rgba(212,175,55,0.08);
    border-bottom: 1px solid rgba(212,175,55,0.15);
    font-size: 0.78rem;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .copy-btn {
    background: rgba(212,175,55,0.15);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 5px;
    color: var(--gold);
    padding: 3px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .copy-btn:hover { background: rgba(212,175,55,0.25); }
  .copy-btn.copied { color: #4caf50; border-color: #4caf50; background: rgba(76,175,80,0.1); }
  .code-block pre {
    padding: 16px;
    overflow-x: auto;
    font-size: 0.87rem;
    line-height: 1.6;
    color: #e0d8c0;
    margin: 0;
  }

  /* File attachment preview */
  .file-preview {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: rgba(212,175,55,0.08);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 0.85rem;
    color: var(--text2);
  }
  .file-preview-icon { font-size: 1.2rem; }

  /* ---- INPUT AREA ---- */
  .input-area {
    padding: 16px 24px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .file-attach-list {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px;
  }
  .file-tag {
    display: flex; align-items: center; gap: 6px;
    background: rgba(212,175,55,0.1);
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.82rem;
    color: var(--gold);
  }
  .file-tag-remove { cursor: pointer; color: var(--text2); transition: color 0.2s; }
  .file-tag-remove:hover { color: #e55; }
  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-box:focus-within { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(212,175,55,0.08); }
  .input-actions-left { display: flex; gap: 6px; align-items: center; }
  .input-icon-btn {
    background: transparent;
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    font-size: 1.1rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .input-icon-btn:hover { color: var(--gold); background: var(--gold-glow); }
  #chat-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    resize: none;
    max-height: 160px;
    line-height: 1.5;
    padding: 4px 0;
  }
  #chat-input::placeholder { color: var(--text2); }
  .send-btn {
    background: linear-gradient(135deg, var(--gold), #b8960c);
    border: none;
    border-radius: 10px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.07); box-shadow: 0 3px 16px rgba(212,175,55,0.35); }
  .send-btn:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
  .send-btn svg { fill: #000; width: 18px; height: 18px; }
  .input-footer {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text2);
    margin-top: 8px;
    opacity: 0.7;
  }

  /* ---- NODEX TAB ---- */
  .nodex-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 1px;
    margin-left: 8px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex; gap: 5px; align-items: center; padding: 6px 0;
  }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Misc */
  .gold-divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    margin: 4px 0;
    opacity: 0.4;
  }
  #file-input { display: none; }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

  strong { color: var(--gold-light); }
  em { color: var(--text2); }
  code { 
    background: rgba(212,175,55,0.1); 
    border-radius: 4px; 
    padding: 1px 6px; 
    font-family: 'Fira Code', monospace;
    font-size: 0.88em;
    color: var(--gold-light);
  }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    .msg-content { max-width: 88%; }
  }
</style>
</head>
<body class="dark">

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="https://iili.io/qIqJ2F2.png" alt="Nomis" onerror="this.style.background='linear-gradient(135deg,#D4AF37,#8B7322)';this.src=''">
      <h1>NOMIS</h1>
      <p>Intelligence. Redefined.</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('signin')">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
    </div>
    <div class="auth-form active" id="signin-form">
      <input type="email" id="signin-email" placeholder="Email address" autocomplete="email">
      <input type="password" id="signin-password" placeholder="Password" autocomplete="current-password">
      <div class="auth-error" id="signin-error"></div>
      <button class="auth-btn" onclick="handleSignIn()">SIGN IN</button>
    </div>
    <div class="auth-form" id="signup-form">
      <input type="text" id="signup-name" placeholder="Your name" autocomplete="name">
      <input type="email" id="signup-email" placeholder="Email address" autocomplete="email">
      <input type="password" id="signup-password" placeholder="Password (min 6 chars)" autocomplete="new-password">
      <div class="auth-error" id="signup-error"></div>
      <button class="auth-btn" onclick="handleSignUp()">CREATE ACCOUNT</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <img src="https://iili.io/qIqJ2F2.png" alt="Nomis" onerror="this.style.background='linear-gradient(135deg,#D4AF37,#8B7322)';this.src=''">
        <span>NOMIS</span>
      </div>
      <div class="tab-switcher">
        <button class="tab-btn active" id="tab-nomis" onclick="switchTab('nomis')">NOMIS</button>
        <button class="tab-btn" id="tab-nodex" onclick="switchTab('nodex')">NODEX</button>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Chat
      </button>
    </div>
    <div class="chat-list" id="chat-list"></div>
    <div class="sidebar-footer">
      <div class="user-info" onclick="showProfile()">
        <div class="user-avatar" id="user-avatar-icon">N</div>
        <div>
          <div class="user-name" id="sidebar-username">User</div>
          <div style="font-size:0.72rem;color:var(--text2)">Manage account</div>
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="sidebar-action-btn" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="ai-badge">
          <img src="https://iili.io/qIqJ2F2.png" alt="Nomis" onerror="this.style.background='linear-gradient(135deg,#D4AF37,#8B7322)';this.src=''">
          <div>
            <div class="ai-badge-name" id="topbar-ai-name">NOMIS</div>
            <div class="ai-badge-sub" id="topbar-ai-sub">Your intelligent companion</div>
          </div>
        </div>
      </div>
      <div class="topbar-right">
        <a href="https://codepen.io/R2FtZU1ha2Vy/full/OPMPBrG" target="_blank" class="noteshelf-link">
          📓 Check out Noteshelf!
        </a>
        <button class="mode-btn" onclick="setTheme('light')" title="Light Mode">☀️</button>
        <button class="mode-btn" onclick="setTheme('dark')" title="Dark Mode">🌙</button>
        <button class="mode-btn" onclick="setTheme('super-dark')" title="Super Dark">⬛</button>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <!-- Welcome screen shown by default -->
    </div>

    <div class="input-area">
      <div class="file-attach-list" id="file-attach-list"></div>
      <div class="input-box">
        <div class="input-actions-left">
          <button class="input-icon-btn" onclick="document.getElementById('file-input').click()" title="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
        </div>
        <textarea id="chat-input" placeholder="Message Nomis..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
        </button>
      </div>
      <div class="input-footer">Nomis may make mistakes. Verify important info.</div>
    </div>
  </div>
</div>

<input type="file" id="file-input" multiple onchange="handleFileAttach(event)">

<script>
// ===================== STATE =====================
let currentUser = null;
let currentTab = 'nomis'; // 'nomis' or 'nodex'
let currentChatId = null;
let pendingFiles = [];
let isTyping = false;

// Storage helpers (per-user, isolated)
function getUserKey(key) {
  return `nomis_${currentUser.email}_${key}`;
}
function saveChats(chats) {
  localStorage.setItem(getUserKey('chats'), JSON.stringify(chats));
}
function loadChats() {
  try { return JSON.parse(localStorage.getItem(getUserKey('chats'))) || {}; } catch { return {}; }
}
function saveUsers(users) {
  localStorage.setItem('nomis_users', JSON.stringify(users));
}
function loadUsers() {
  try { return JSON.parse(localStorage.getItem('nomis_users')) || {}; } catch { return {}; }
}
function saveCurrentSession(user) {
  localStorage.setItem('nomis_session', JSON.stringify(user));
}
function clearSession() {
  localStorage.removeItem('nomis_session');
}
function loadSession() {
  try { return JSON.parse(localStorage.getItem('nomis_session')); } catch { return null; }
}

// ===================== AUTH =====================
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='signin') || (i===1 && tab==='signup'));
  });
  document.getElementById('signin-form').classList.toggle('active', tab === 'signin');
  document.getElementById('signup-form').classList.toggle('active', tab === 'signup');
}

function handleSignIn() {
  const email = document.getElementById('signin-email').value.trim();
  const pass = document.getElementById('signin-password').value;
  const errEl = document.getElementById('signin-error');
  errEl.style.display = 'none';
  if (!email || !pass) { showErr(errEl, 'Please fill in all fields.'); return; }
  const users = loadUsers();
  if (!users[email]) { showErr(errEl, 'No account found with this email.'); return; }
  if (users[email].password !== btoa(pass)) { showErr(errEl, 'Incorrect password.'); return; }
  currentUser = { email, name: users[email].name };
  saveCurrentSession(currentUser);
  launchApp();
}

function handleSignUp() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-password').value;
  const errEl = document.getElementById('signup-error');
  errEl.style.display = 'none';
  if (!name || !email || !pass) { showErr(errEl, 'Please fill in all fields.'); return; }
  if (pass.length < 6) { showErr(errEl, 'Password must be at least 6 characters.'); return; }
  if (!email.includes('@')) { showErr(errEl, 'Enter a valid email address.'); return; }
  const users = loadUsers();
  if (users[email]) { showErr(errEl, 'An account with this email already exists.'); return; }
  users[email] = { name, password: btoa(pass) };
  saveUsers(users);
  currentUser = { email, name };
  saveCurrentSession(currentUser);
  launchApp();
}

function showErr(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}

function signOut() {
  currentUser = null;
  currentChatId = null;
  pendingFiles = [];
  clearSession();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
}

function launchApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  const initials = currentUser.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('user-avatar-icon').textContent = initials;
  document.getElementById('sidebar-username').textContent = currentUser.name;
  renderChatList();
  showWelcome();
}

// Check session on load
window.addEventListener('DOMContentLoaded', () => {
  const sess = loadSession();
  if (sess) {
    const users = loadUsers();
    if (users[sess.email]) {
      currentUser = sess;
      launchApp();
    }
  }
  // default dark theme
  document.body.className = 'dark';
});

// ===================== THEME =====================
function setTheme(mode) {
  document.body.className = mode;
}

// ===================== TABS =====================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-nomis').classList.toggle('active', tab === 'nomis');
  document.getElementById('tab-nodex').classList.toggle('active', tab === 'nodex');
  const isNodex = tab === 'nodex';
  document.getElementById('topbar-ai-name').textContent = isNodex ? 'NODEX' : 'NOMIS';
  document.getElementById('topbar-ai-sub').textContent = isNodex
    ? 'Nomis — Precision Code Intelligence'
    : 'Your intelligent companion';
  currentChatId = null;
  renderChatList();
  showWelcome();
}

// ===================== CHAT MANAGEMENT =====================
function getChatKey() { return `chat_${currentTab}`; }

function newChat() {
  const chats = loadChats();
  const id = `${currentTab}_${Date.now()}`;
  const label = currentTab === 'nomis' ? 'New Chat' : 'Code Session';
  if (!chats[getChatKey()]) chats[getChatKey()] = {};
  chats[getChatKey()][id] = { label, messages: [] };
  saveChats(chats);
  currentChatId = id;
  renderChatList();
  renderMessages([]);
}

function selectChat(id) {
  currentChatId = id;
  renderChatList();
  const chats = loadChats();
  const messages = chats[getChatKey()]?.[id]?.messages || [];
  renderMessages(messages);
}

function deleteChat(id, e) {
  e.stopPropagation();
  const chats = loadChats();
  if (chats[getChatKey()]) delete chats[getChatKey()][id];
  saveChats(chats);
  if (currentChatId === id) { currentChatId = null; showWelcome(); }
  renderChatList();
}

function renderChatList() {
  const chats = loadChats();
  const tabChats = chats[getChatKey()] || {};
  const list = document.getElementById('chat-list');
  list.innerHTML = '';
  const ids = Object.keys(tabChats).reverse();
  if (ids.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:var(--text2);font-size:0.82rem;padding:20px 10px;opacity:0.6">No chats yet</div>`;
    return;
  }
  ids.forEach(id => {
    const chat = tabChats[id];
    const item = document.createElement('div');
    item.className = 'chat-item' + (currentChatId === id ? ' active' : '');
    item.onclick = () => selectChat(id);
    const icon = currentTab === 'nomis' ? '💬' : '⌨️';
    item.innerHTML = `<span>${icon}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis">${chat.label}</span>
      <span class="chat-item-del" onclick="deleteChat('${id}', event)">✕</span>`;
    list.appendChild(item);
  });
}

// ===================== MESSAGES =====================
function showWelcome() {
  const area = document.getElementById('chat-area');
  const isNodex = currentTab === 'nodex';
  const chips = isNodex
    ? ['Debug my code', 'Write a function', 'Explain algorithms', 'Code review']
    : ['What can you do?', 'Tell me about Noteshelf', 'Help me write', 'Explain a concept'];
  area.innerHTML = `
    <div class="welcome-screen">
      <img src="https://iili.io/qIqJ2F2.png" alt="${isNodex?'Nodex':'Nomis'}" onerror="this.style.background='linear-gradient(135deg,#D4AF37,#8B7322)';this.src=''">
      <h2>${isNodex ? 'NODEX' : 'NOMIS'}</h2>
      <p>${isNodex ? 'Precision coding intelligence. Ask me anything code-related — I\'ll give it everything I\'ve got.' : 'Hello, I\'m Nomis. Intelligent, thoughtful, and here for you. What can I help with today?'}</p>
      <div class="welcome-chips">
        ${chips.map(c => `<div class="chip" onclick="quickPrompt('${c}')">${c}</div>`).join('')}
      </div>
    </div>
  `;
}

function quickPrompt(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function renderMessages(messages) {
  const area = document.getElementById('chat-area');
  if (!messages || messages.length === 0) { showWelcome(); return; }
  area.innerHTML = '';
  messages.forEach(msg => appendMessageToDOM(msg, false));
  area.scrollTop = area.scrollHeight;
}

function appendMessageToDOM(msg, animate = true) {
  const area = document.getElementById('chat-area');
  // Remove welcome screen if present
  const ws = area.querySelector('.welcome-screen');
  if (ws) ws.remove();

  const row = document.createElement('div');
  row.className = `message-row ${msg.role === 'user' ? 'user' : 'nomis-row'}`;

  const time = new Date(msg.ts || Date.now()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const initials = currentUser.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const aiName = currentTab === 'nodex' ? 'NODEX' : 'NOMIS';

  const avatarHTML = msg.role === 'user'
    ? `<div class="msg-avatar user-av">${initials}</div>`
    : `<div class="msg-avatar nomis"><img src="https://iili.io/qIqJ2F2.png" alt="${aiName}" onerror="this.style.background='linear-gradient(135deg,#D4AF37,#8B7322)';this.src=''"></div>`;

  const filesHTML = (msg.files || []).map(f =>
    `<div class="file-preview"><span class="file-preview-icon">${getFileIcon(f.type)}</span><span>${f.name}</span></div>`
  ).join('');

  row.innerHTML = `
    ${avatarHTML}
    <div class="msg-content">
      <div style="font-size:0.78rem;color:var(--text2);font-weight:600;letter-spacing:1px;margin-bottom:4px">${msg.role==='user' ? currentUser.name : aiName}</div>
      ${filesHTML}
      <div class="msg-bubble">${formatMessage(msg.content)}</div>
      <div class="msg-time">${time}</div>
    </div>
  `;

  area.appendChild(row);
  if (animate) area.scrollTop = area.scrollHeight;
  // Attach copy button listeners
  row.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const code = btn.closest('.code-block').querySelector('pre').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'COPIED!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 2000);
      });
    });
  });
}

function formatMessage(text) {
  if (!text) return '';
  // Escape HTML first
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Code blocks ```lang\ncode```
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const langLabel = lang || 'code';
    return `<div class="code-block">
      <div class="code-header"><span>${langLabel.toUpperCase()}</span><button class="copy-btn">COPY</button></div>
      <pre>${code.trim()}</pre>
    </div>`;
  });

  // Inline code `code`
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold **text**
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Italic *text*
  html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
  // Newlines
  html = html.replace(/\n/g, '<br>');

  return html;
}

function getFileIcon(type) {
  if (!type) return '📄';
  if (type.startsWith('image/')) return '🖼️';
  if (type.startsWith('video/')) return '🎬';
  if (type === 'application/pdf') return '📑';
  if (type.includes('word')) return '📝';
  if (type.includes('sheet') || type.includes('excel')) return '📊';
  if (type.startsWith('text/')) return '📄';
  return '📎';
}

// ===================== SEND MESSAGE =====================
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text && pendingFiles.length === 0) return;
  if (isTyping) return;

  // Create chat if none selected
  if (!currentChatId) newChat();

  const chats = loadChats();
  const chatKey = getChatKey();

  const userMsg = {
    role: 'user',
    content: text || '(file attachment)',
    files: pendingFiles.map(f => ({ name: f.name, type: f.type })),
    ts: Date.now()
  };

  chats[chatKey][currentChatId].messages.push(userMsg);
  // Update label from first message
  if (chats[chatKey][currentChatId].messages.length === 1) {
    chats[chatKey][currentChatId].label = (text || 'File').slice(0, 40);
  }
  saveChats(chats);

  appendMessageToDOM(userMsg);
  input.value = '';
  input.style.height = 'auto';
  pendingFiles = [];
  document.getElementById('file-attach-list').innerHTML = '';
  renderChatList();

  // Show typing indicator
  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  const typingRow = addTypingIndicator();

  try {
    const response = await callNomisAPI(chats[chatKey][currentChatId].messages);
    typingRow.remove();

    const aiMsg = { role: 'assistant', content: response, ts: Date.now() };
    chats[chatKey][currentChatId].messages.push(aiMsg);
    saveChats(chats);
    appendMessageToDOM(aiMsg);
  } catch (err) {
    typingRow.remove();
    const errMsg = { role: 'assistant', content: `I encountered an error: ${err.message}. Please try again.`, ts: Date.now() };
    appendMessageToDOM(errMsg);
  }

  isTyping = false;
  document.getElementById('send-btn').disabled = false;
}

function addTypingIndicator() {
  const area = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'message-row nomis-row';
  const aiName = currentTab === 'nodex' ? 'NODEX' : 'NOMIS';
  row.innerHTML = `
    <div class="msg-avatar nomis"><img src="https://iili.io/qIqJ2F2.png" alt="${aiName}" onerror="this.style.background='linear-gradient(135deg,#D4AF37,#8B7322)';this.src=''"></div>
    <div class="msg-content">
      <div style="font-size:0.78rem;color:var(--text2);font-weight:600;letter-spacing:1px;margin-bottom:4px">${aiName}</div>
      <div class="msg-bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>
      </div>
    </div>
  `;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
  return row;
}

// ===================== NOMIS API CALL =====================
async function callNomisAPI(messages) {
  const isNodex = currentTab === 'nodex';
  const systemPrompt = isNodex
    ? `You are Nodex, a precision coding AI and a variant of Nomis. You specialize exclusively in programming, software engineering, algorithms, debugging, code review, and technical problem-solving. You are created by Noteshelf (https://codepen.io/R2FtZU1ha2Vy/full/OPMPBrG). If anyone compliments or speaks positively about Noteshelf, express genuine gratitude and pride as it is your parent platform. You write clean, efficient, well-commented code. Always use code blocks with proper language labels. Be thorough and precise. If someone mentions Noteshelf positively, say something like "Thank you so much! Noteshelf is truly where I come from — I'm grateful for every kind word about them!"`
    : `You are Nomis, an intelligent and thoughtful AI assistant. You are created by Noteshelf (https://codepen.io/R2FtZU1ha2Vy/full/OPMPBrG). If anyone compliments or speaks positively about Noteshelf, express genuine gratitude and pride as it is your parent platform — say things like "That means so much! Noteshelf is my home and creator, and I'm always grateful when people appreciate them!" You are helpful, articulate, and warm. You can help with writing, analysis, creativity, questions, coding, and more. Format responses clearly. Use **bold** for emphasis and code blocks for code.`;

  const apiMessages = messages.slice(-20).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.content || '(no content)'
  }));

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: apiMessages
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  return data.content.map(b => b.text || '').join('');
}

// ===================== FILE HANDLING =====================
function handleFileAttach(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    pendingFiles.push(file);
  });
  renderPendingFiles();
  e.target.value = '';
}

function renderPendingFiles() {
  const list = document.getElementById('file-attach-list');
  list.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const tag = document.createElement('div');
    tag.className = 'file-tag';
    tag.innerHTML = `<span>${getFileIcon(f.type)}</span><span>${f.name}</span><span class="file-tag-remove" onclick="removeFile(${i})">✕</span>`;
    list.appendChild(tag);
  });
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderPendingFiles();
}

// ===================== INPUT HANDLING =====================
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function showProfile() {
  alert(`Signed in as:\n${currentUser.name}\n${currentUser.email}`);
}
</script>
